<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fb">
  <meta name="robots" content="noindex,nofollow">

  <title>Physics Question Capsule — GitHub Pages Prototype v0.3.1</title>
  
  <style>
:root {
  --bg:#eef3f8;--surface:#fff;--surface-muted:#f5f7fa;--ink:#142033;--ink-soft:#5f6b7a;
  --line:#d7dee8;--accent:#2f6fed;--accent-soft:#e8f0ff;--success:#18794e;--success-soft:#e8f7ef;
  --warning:#9a5b13;--warning-soft:#fff3df;--danger:#b42318;--danger-soft:#ffefed;
  --shadow:0 22px 60px rgba(20,32,51,.14);--radius-xl:28px;--radius-lg:20px;--radius-md:14px;
  --safe-bottom:max(16px,env(safe-area-inset-bottom));
}
*{box-sizing:border-box} html{background:var(--bg);scroll-behavior:smooth}
body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 15% 15%,rgba(47,111,237,.10),transparent 24rem),radial-gradient(circle at 85% 88%,rgba(24,121,78,.07),transparent 28rem),var(--bg);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
button,input,textarea{font:inherit} button{cursor:pointer} button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid rgba(47,111,237,.28);outline-offset:3px}
button:disabled{cursor:not-allowed;opacity:.5}.prototype-shell{width:min(100%,480px);min-height:100vh;margin:0 auto;background:var(--surface);position:relative;overflow:hidden}
@media(min-width:720px){body{padding:28px}.prototype-shell{min-height:calc(100vh - 56px);border-radius:34px;box-shadow:var(--shadow);border:1px solid rgba(215,222,232,.9)}}
.app-header{min-height:72px;padding:max(14px,env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}
.icon-button{width:42px;height:42px;border:0;border-radius:50%;background:var(--surface-muted);color:var(--ink);font-size:22px}.brand-lockup{display:flex;align-items:center;min-width:0;gap:9px;flex:1;border:0;background:none;text-align:left;padding:0}.brand-mark{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;font-weight:800;background:linear-gradient(145deg,#2f6fed,#5d8df4);color:#fff;box-shadow:0 8px 18px rgba(47,111,237,.22)}.brand-name{font-weight:750;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.credit-pill{flex:none;min-height:38px;display:inline-flex;align-items:center;gap:5px;border:1px solid #cbd8f4;background:var(--accent-soft);color:#2356bd;border-radius:999px;padding:7px 11px;font-size:12px}.credit-pill strong{font-size:14px}
main{padding:22px 20px calc(104px + var(--safe-bottom));min-height:calc(100vh - 72px)}.screen{animation:screen-in .24s ease both}@keyframes screen-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{margin:0 0 7px;color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1,h2,h3,p{margin-top:0}h1{font-size:clamp(28px,8vw,38px);line-height:1.08;margin-bottom:12px;letter-spacing:-.035em}h2{font-size:23px;line-height:1.18;margin-bottom:8px;letter-spacing:-.02em}h3{font-size:17px;line-height:1.3;margin-bottom:6px}p{color:var(--ink-soft);line-height:1.55}.muted-note{font-size:13px;color:var(--ink-soft)}
.hero{background:linear-gradient(155deg,#edf3ff,#f8fbff 54%,#eef8f3);border:1px solid #d7e2f7;border-radius:var(--radius-xl);padding:24px;margin-bottom:18px;overflow:hidden;position:relative}.hero::after{content:"";position:absolute;width:150px;height:150px;right:-50px;top:-48px;border-radius:50%;border:28px solid rgba(47,111,237,.08)}.hero>*{position:relative;z-index:1}
.scope-row,.chip-row,.vault-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}.scope-row::-webkit-scrollbar,.chip-row::-webkit-scrollbar,.vault-tabs::-webkit-scrollbar{display:none}.chip{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:999px;padding:9px 13px;white-space:nowrap;min-height:40px}.chip.is-selected{border-color:#86a9f3;background:var(--accent-soft);color:#234f9e;font-weight:700}
.section-heading{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:23px 0 12px}.section-heading p{margin-bottom:1px;font-size:13px}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:17px;margin-bottom:12px;box-shadow:0 8px 24px rgba(20,32,51,.045)}.card.is-accent{border-color:#9db9f2;box-shadow:0 10px 28px rgba(47,111,237,.11)}.card.is-warning{background:var(--warning-soft);border-color:#efd3a5}.card.is-success{background:var(--success-soft);border-color:#b9e2cb}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat-card{padding:14px;border-radius:var(--radius-md);background:var(--surface-muted);border:1px solid #e3e8ef}.stat-card strong{display:block;font-size:21px;margin-bottom:2px}.stat-card span{color:var(--ink-soft);font-size:12px}
.capsule-list{display:grid;gap:12px}.capsule-card{border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-lg);padding:17px;text-align:left;width:100%;box-shadow:0 8px 20px rgba(20,32,51,.04);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}.capsule-card:hover{transform:translateY(-2px);border-color:#9ab5ed;box-shadow:0 12px 28px rgba(47,111,237,.10)}.capsule-card.is-selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,111,237,.11)}.capsule-top{display:flex;justify-content:space-between;gap:16px;align-items:start}.capsule-price{color:#2356bd;background:var(--accent-soft);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.capsule-meta,.question-labels{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.meta-tag{border-radius:999px;padding:6px 9px;background:var(--surface-muted);color:var(--ink-soft);font-size:11px}
.button-row{display:grid;gap:10px;margin-top:18px}.button-row.split{grid-template-columns:1fr 1fr}.primary-button,.secondary-button,.text-button,.danger-button{width:100%;min-height:50px;border-radius:var(--radius-md);padding:13px 16px;font-weight:800}.primary-button{border:0;background:var(--accent);color:#fff;box-shadow:0 10px 20px rgba(47,111,237,.22)}.secondary-button{border:1px solid var(--line);background:var(--surface);color:var(--ink)}.text-button{border:0;background:transparent;color:var(--accent)}.danger-button{border:1px solid #efc2bd;background:var(--danger-soft);color:var(--danger)}.inline-button{border:0;background:var(--accent-soft);color:#2356bd;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:800;white-space:nowrap}
.guarantee-list{margin:0;padding-left:21px;color:var(--ink-soft)}.guarantee-list li{margin:8px 0;line-height:1.45}.divider{height:1px;background:var(--line);margin:16px 0}.ledger{border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;margin:16px 0}.ledger-row{display:flex;justify-content:space-between;gap:18px;padding:13px 15px;border-bottom:1px solid var(--line);align-items:center}.ledger-row:last-child{border-bottom:0;background:var(--surface-muted)}
.open-stage{min-height:calc(100vh - 210px);display:grid;place-items:center;text-align:center}.capsule-visual{width:170px;height:120px;margin:0 auto 26px;position:relative}.capsule-half{position:absolute;top:30px;width:78px;height:62px;background:linear-gradient(145deg,#2f6fed,#77a0f7);box-shadow:0 16px 28px rgba(47,111,237,.24)}.capsule-half.left{left:7px;border-radius:50px 10px 10px 50px}.capsule-half.right{right:7px;border-radius:10px 50px 50px 10px;background:linear-gradient(145deg,#8bb0fb,#d6e3ff)}.is-opening .left{animation:open-left .8s ease forwards}.is-opening .right{animation:open-right .8s ease forwards}@keyframes open-left{to{transform:translateX(-15px) rotate(-5deg)}}@keyframes open-right{to{transform:translateX(15px) rotate(5deg)}}
.progress-bar{height:8px;border-radius:999px;background:#e8edf4;overflow:hidden;margin:0 0 18px}.progress-bar span{display:block;height:100%;background:linear-gradient(90deg,#2f6fed,#6b98f3);border-radius:inherit}.question-card{border:1px solid var(--line);border-radius:var(--radius-xl);padding:20px;background:var(--surface);box-shadow:0 12px 34px rgba(20,32,51,.07)}.question-text{color:var(--ink);font-size:19px;line-height:1.55;margin:21px 0}.answer-field{margin-top:18px}.answer-field label{display:block;font-weight:800;margin-bottom:8px}.answer-input-wrap{display:flex;align-items:center;border:1px solid #bfc9d7;border-radius:var(--radius-md);overflow:hidden;background:#fff}.answer-input-wrap input{min-width:0;flex:1;border:0;padding:14px;font-size:18px}.answer-input-wrap span{padding:0 14px;color:var(--ink-soft);font-weight:700}.option-list{display:grid;gap:10px}.option-button{width:100%;min-height:52px;text-align:left;padding:13px 14px;border:1px solid var(--line);background:#fff;border-radius:var(--radius-md);color:var(--ink)}.option-button.is-selected{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 2px rgba(47,111,237,.10)}
.feedback-banner{border-radius:var(--radius-lg);padding:18px;margin-bottom:16px;display:grid;gap:4px}.feedback-banner strong{font-size:24px}.feedback-banner.is-correct{background:var(--success-soft);border:1px solid #b4dfc8;color:var(--success)}.feedback-banner.is-review{background:var(--warning-soft);border:1px solid #f0d2a1;color:var(--warning)}.solution-steps{display:grid;gap:9px}.solution-step{padding:12px 14px;border-left:4px solid #88a9ee;background:#f6f9ff;border-radius:0 12px 12px 0}.solution-step p{margin:0;color:var(--ink)}
.progress-list{display:grid;gap:10px}.progress-item,.vault-card{display:flex;align-items:center;justify-content:space-between;gap:12px}.progress-item button,.vault-card button{flex:none}.status{display:inline-flex;border-radius:999px;padding:6px 9px;background:var(--success-soft);color:var(--success);font-size:11px;font-weight:800}.status.needs-review{background:var(--warning-soft);color:var(--warning)}.status.not-started{background:var(--surface-muted);color:var(--ink-soft)}.status.skipped{background:#fff1e8;color:#a34815}.status.alternative{background:var(--accent-soft);color:#2356bd}
.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,480px);min-height:74px;padding:9px 16px var(--safe-bottom);display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--line);background:rgba(255,255,255,.96);backdrop-filter:blur(14px);z-index:30}.bottom-nav.hidden{display:none}.nav-item{border:0;background:transparent;color:#7a8594;border-radius:12px;display:grid;place-items:center;align-content:center;gap:2px;font-size:11px}.nav-item.is-active{background:var(--accent-soft);color:#2356bd;font-weight:800}.nav-icon{font-size:20px}.toast{position:fixed;left:50%;bottom:calc(90px + var(--safe-bottom));transform:translateX(-50%);width:min(calc(100% - 40px),420px);padding:13px 15px;border-radius:14px;background:#142033;color:white;box-shadow:0 18px 40px rgba(20,32,51,.28);z-index:50;text-align:center;font-size:14px}.prototype-note{border:1px dashed #aeb9c7;border-radius:var(--radius-md);padding:12px;background:#fbfcfe;color:var(--ink-soft);font-size:12px;margin-top:14px}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important}}

</style>

<body>
  <div class="prototype-shell">
    <header class="app-header" aria-label="Application header">
      <button class="icon-button" id="backButton" type="button" aria-label="Go back" hidden>←</button>
      <button class="brand-lockup" id="brandHome" type="button" aria-label="Go to Home">
        <span class="brand-mark" aria-hidden="true">φ</span>
        <span class="brand-name">Physics Question Capsule</span>
      </button>
      <button class="credit-pill" id="creditButton" type="button" aria-label="Open Credits information">
        <span aria-hidden="true">●</span><strong id="creditBalance">20</strong><span>Credits</span>
      </button>
    </header>

    <main id="app" tabindex="-1" aria-live="polite"></main>

    <nav class="bottom-nav" id="bottomNav" aria-label="Primary navigation">
      <button type="button" data-nav="home" class="nav-item is-active"><span class="nav-icon" aria-hidden="true">⌂</span><span>Home</span></button>
      <button type="button" data-nav="vault" class="nav-item"><span class="nav-icon" aria-hidden="true">▤</span><span>Vault</span></button>
      <button type="button" data-nav="credits" class="nav-item"><span class="nav-icon" aria-hidden="true">●</span><span>Credits</span></button>
    </nav>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  <script>
(() => {
  'use strict';
  const STORAGE_KEY = 'pqc.mobile.prototype.v0.3.1';
  const SCHEMA_VERSION = 3;
  const storage = (() => {
    try {
      const probe = '__pqc_probe__';
      window.localStorage.setItem(probe, '1');
      window.localStorage.removeItem(probe);
      return window.localStorage;
    } catch (_) {
      let store = {};
      try {
        const raw = window.name.startsWith('PQCSTORE:') ? window.name.slice(9) : '{}';
        store = JSON.parse(raw) || {};
      } catch (_) { store = {}; }
      const sync = () => { try { window.name = 'PQCSTORE:' + JSON.stringify(store); } catch (_) {} };
      return {
        getItem: key => Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null,
        setItem: (key, value) => { store[key] = String(value); sync(); },
        removeItem: key => { delete store[key]; sync(); },
        clear: () => { store = {}; sync(); }
      };
    }
  })();

  const capsules = {
    quick:{key:'quick',name:'Quick Capsule',cost:3,duration:'8–12 min',summary:'3 short questions',questionIds:['speed-1','force-1','energy-1'],guarantee:['3 short questions','Immediate Feedback','Worked Solutions']},
    balanced:{key:'balanced',name:'Balanced Capsule',cost:6,duration:'15–20 min',summary:'2 short + 1 structured + 1 applied',questionIds:['speed-1','force-1','energy-1','misconception-1'],guarantee:['2 short questions','1 structured question','1 applied question','Full Worked Solutions']},
    challenge:{key:'challenge',name:'Challenge Capsule',cost:8,duration:'18–25 min',summary:'4 deeper-reasoning questions',questionIds:['energy-1','force-alt','speed-alt','misconception-1'],guarantee:['1 standard question','1 multi-step calculation','1 unfamiliar-context question','1 misconception challenge','Full Worked Solutions']}
  };

  const questions = {
    'speed-1':{id:'speed-1',title:'Average Speed',topic:'Motion',classification:'Core',marks:2,type:'numeric',stem:"A cyclist travels 120 m in 15 s. Calculate the cyclist's average speed.",unit:'m/s',answer:8,tolerance:0.001,answerText:'8.0 m/s',hint:'Use speed = distance ÷ time.',solution:['Write the relationship: speed = distance ÷ time.','Substitute: 120 m ÷ 15 s.','Calculate: 8.0 m/s.'],alternativeId:'speed-alt'},
    'speed-alt':{id:'speed-alt',title:'Average Speed — Alternative',topic:'Motion',classification:'Applied',marks:2,type:'numeric',stem:'A runner covers 150 m in 12 s. Calculate the average speed.',unit:'m/s',answer:12.5,tolerance:0.001,answerText:'12.5 m/s',hint:'Divide distance by time.',solution:['speed = distance ÷ time','speed = 150 m ÷ 12 s','speed = 12.5 m/s'],alternativeId:'speed-1'},
    'force-1':{id:'force-1',title:'Resultant Force',topic:'Forces',classification:'Core',marks:2,type:'choice',stem:'A 5.0 kg object accelerates at 2.0 m/s². What is the resultant force?',options:['2.5 N','7.0 N','10 N','14 N'],answer:'10 N',answerText:'10 N',hint:'Use F = ma.',solution:['Use F = ma.','Substitute: F = 5.0 kg × 2.0 m/s².','F = 10 N.'],alternativeId:'force-alt'},
    'force-alt':{id:'force-alt',title:'Opposing Forces — Alternative',topic:'Forces',classification:'Applied',marks:2,type:'choice',stem:'A force of 18 N acts right and a force of 7 N acts left. What is the resultant force?',options:['11 N right','11 N left','25 N right','25 N left'],answer:'11 N right',answerText:'11 N right',hint:'Subtract opposite forces and keep the direction of the larger force.',solution:['The forces act in opposite directions.','18 N − 7 N = 11 N.','The larger force is to the right, so the resultant is 11 N right.'],alternativeId:'force-1'},
    'energy-1':{id:'energy-1',title:'Gravitational Potential Energy',topic:'Energy',classification:'Structured',marks:3,type:'numeric',stem:'A 2.0 kg object is raised vertically by 5.0 m. Use g = 9.8 N/kg. Calculate the increase in gravitational potential energy.',unit:'J',answer:98,tolerance:0.01,answerText:'98 J',hint:'Use ΔEₚ = mgh.',solution:['Use ΔEₚ = mgh.','Substitute: 2.0 kg × 9.8 N/kg × 5.0 m.','ΔEₚ = 98 J.'],alternativeId:'power-alt'},
    'power-alt':{id:'power-alt',title:'Power — Alternative',topic:'Energy',classification:'Applied',marks:2,type:'numeric',stem:'A device transfers 450 J of energy in 15 s. Calculate its power.',unit:'W',answer:30,tolerance:0.001,answerText:'30 W',hint:'Use power = energy transferred ÷ time.',solution:['power = energy transferred ÷ time','power = 450 J ÷ 15 s','power = 30 W'],alternativeId:'energy-1'},
    'misconception-1':{id:'misconception-1',title:'Zero Resultant Force',topic:'Forces',classification:'Misconception Challenge',marks:1,type:'choice',stem:'An object has zero resultant force acting on it. Which statement must be true?',options:['It must be stationary.','It moves with constant velocity or remains stationary.','It must be slowing down.','It must be accelerating.'],answer:'It moves with constant velocity or remains stationary.',answerText:'It moves with constant velocity or remains stationary.',hint:"Newton's first law applies when the resultant force is zero.",solution:['Zero resultant force means zero acceleration.','The velocity therefore does not change.','The object may remain stationary or move with constant velocity.'],alternativeId:'force-alt'}
  };

  const defaultState = () => ({
    schemaVersion:SCHEMA_VERSION,route:'home',history:[],credits:20,topic:'Mixed Practice',selectedCapsule:null,
    activeCapsule:null,vault:{},vaultFilter:'all',selectedVaultQuestion:null,participantCode:'PQC-7K2M',lastSavedAt:null
  });

  let state = loadState();
  const app=document.getElementById('app'),backButton=document.getElementById('backButton'),bottomNav=document.getElementById('bottomNav'),creditBalance=document.getElementById('creditBalance'),creditButton=document.getElementById('creditButton'),brandHome=document.getElementById('brandHome'),toast=document.getElementById('toast');

  function loadState(){
    try{
      const raw=storage.getItem(STORAGE_KEY); if(!raw) return defaultState();
      const parsed=JSON.parse(raw); if(parsed.schemaVersion!==SCHEMA_VERSION) return defaultState();
      return {...defaultState(),...parsed,route:'home',history:[]};
    }catch(_){return defaultState();}
  }
  function persist(){state.lastSavedAt=new Date().toISOString();storage.setItem(STORAGE_KEY,JSON.stringify(state));}
  function resetState(){storage.removeItem(STORAGE_KEY);state=defaultState();render();showToast('Prototype data reset.');}
  function escapeHtml(value){return String(value??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');}
  function showToast(message){toast.textContent=message;toast.hidden=false;clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.hidden=true,2600);}
  function navigate(route,options={}){if(!options.replace&&state.route!==route)state.history.push(state.route);state.route=route;persist();render();window.scrollTo(0,0);requestAnimationFrame(()=>app.focus({preventScroll:true}));}
  function goBack(){const previous=state.history.pop();state.route=previous||'home';persist();render();window.scrollTo(0,0);}
  function setNavActive(route){document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('is-active',b.dataset.nav===route));}
  function updateChrome(){creditBalance.textContent=state.credits;const focused=['opening','question','feedback','progress'];bottomNav.classList.toggle('hidden',focused.includes(state.route));backButton.hidden=state.route==='home';setNavActive(['home','vault','credits'].includes(state.route)?state.route:'');}
  function activeProgress(){if(!state.activeCapsule)return{done:0,total:0};const done=state.activeCapsule.slots.filter(s=>s.completed).length;return{done,total:state.activeCapsule.slots.length};}
  function vaultCount(){return Object.keys(state.vault).length;}
  function capsuleName(key){return capsules[key]?.name||'Practice Capsule';}
  function currentSlot(){return state.activeCapsule?.slots?.[state.activeCapsule.currentIndex]||null;}
  function unlockQuestion(qid,capsuleId,isAlternative=false){if(!state.vault[qid])state.vault[qid]={questionId:qid,sourceCapsuleId:capsuleId,unlockedAt:new Date().toISOString(),attempts:[],status:'not-started',favourite:false,revision:false,solutionSeen:false,isAlternative};}
  function makeCapsule(type){const c=capsules[type];const id='cap-'+Date.now();const slots=c.questionIds.map(qid=>({baseId:qid,currentId:qid,alternatives:[],completed:false,skipped:false,lastFeedback:null}));const cap={id,type,topic:state.topic,status:'active',openedAt:new Date().toISOString(),currentIndex:0,rerollUsed:false,slots};slots.forEach(s=>unlockQuestion(s.baseId,id,false));return cap;}
  function findNextIncomplete(start=0){const cap=state.activeCapsule;if(!cap)return-1;for(let i=start;i<cap.slots.length;i++)if(!cap.slots[i].completed)return i;for(let i=0;i<start;i++)if(!cap.slots[i].completed)return i;return-1;}
  function statusLabel(entry){if(entry.status==='completed')return'Completed';if(entry.status==='needs-review')return'Needs Review';return'Not Started';}
  function statusClass(entry){if(entry.status==='completed')return'';if(entry.status==='needs-review')return'needs-review';return'not-started';}

  function homeView(){const p=activeProgress();const active=state.activeCapsule&&state.activeCapsule.status==='active';return `<section class="screen">
    <div class="hero"><p class="eyebrow">Cambridge IGCSE Physics 0625 · Extended</p><h1>Physics practice with a useful set every time.</h1><p>Question mix may vary, but every capsule guarantees the stated number and types of questions. Everything you unlock stays in <strong>My Question Vault</strong>.</p><div class="scope-row" aria-label="Practice scope">${['Mixed Practice','Motion','Forces','Energy'].map(t=>`<button class="chip ${state.topic===t?'is-selected':''}" data-topic="${t}">${t}</button>`).join('')}</div></div>
    <div class="stat-grid"><div class="stat-card"><strong>${state.credits}</strong><span>Credits available</span></div><div class="stat-card"><strong>${vaultCount()}</strong><span>Questions in Vault</span></div></div>
    ${active?`<div class="section-heading"><div><h2>Continue your capsule</h2><p>${capsuleName(state.activeCapsule.type)} · ${p.done}/${p.total} complete</p></div></div><div class="card is-accent"><h3>${capsuleName(state.activeCapsule.type)}</h3><p>Your progress is saved on this device.</p><div class="progress-bar"><span style="width:${p.total?Math.round(p.done/p.total*100):0}%"></span></div><button class="primary-button" data-action="continue-capsule">Continue Active Capsule</button></div>`:''}
    <div class="section-heading"><div><h2>${active?'Practice options':'Start a practice set'}</h2><p>${state.topic}</p></div></div>
    <div class="card ${active?'':'is-accent'}"><p class="eyebrow">${active?'One active capsule at a time':'Recommended starting point'}</p><h3>Compare capsule guarantees</h3><p>${active?'Complete or reset the active capsule before opening another one.':'Choose the session length and question mix you need before spending Credits.'}</p><button class="primary-button" data-action="choose-capsule" ${active?'disabled':''}>Choose a Capsule</button></div>
    <div class="section-heading"><div><h2>How it works</h2></div></div><div class="card"><ul class="guarantee-list"><li>See guaranteed contents and cost before opening.</li><li>Answer one question at a time with Immediate Feedback.</li><li>Keep every unlocked question and Worked Solution.</li></ul></div>
    <p class="prototype-note">Prototype data is stored only in this browser using localStorage. No account, payment or real advertisement is active.</p>
  </section>`;}

  function capsulesView(){const active=state.activeCapsule&&state.activeCapsule.status==='active';return `<section class="screen"><p class="eyebrow">${state.topic}</p><h1>Choose a capsule</h1><p>Each option guarantees useful Physics practice. Higher cost reflects a longer or more complex session, not a chance of winning better value.</p>${active?`<div class="card is-warning"><h3>Active capsule detected</h3><p>Continue or complete the current capsule before opening another.</p><button class="primary-button" data-action="continue-capsule">Continue Active Capsule</button></div>`:`<div class="capsule-list">${Object.values(capsules).map(c=>`<button class="capsule-card ${state.selectedCapsule===c.key?'is-selected':''}" data-capsule="${c.key}" aria-pressed="${state.selectedCapsule===c.key}"><div class="capsule-top"><div><h3>${c.name}</h3><p>${c.summary}</p></div><span class="capsule-price">${c.cost} Credits</span></div><div class="capsule-meta"><span class="meta-tag">${c.duration}</span><span class="meta-tag">Worked Solutions</span></div></button>`).join('')}</div><div class="button-row"><button class="primary-button" data-action="view-details" ${state.selectedCapsule?'':'disabled'}>View Details</button><button class="secondary-button" data-action="return-home">Back to Home</button></div>`}</section>`;}

  function detailView(){const c=capsules[state.selectedCapsule]||capsules.balanced;return `<section class="screen"><p class="eyebrow">${state.topic}</p><h1>${c.name}</h1><p>Your question mix may vary, but you will always receive the guaranteed number and types shown here.</p><div class="card is-accent"><div class="capsule-top"><h3>Guaranteed contents</h3><span class="capsule-price">${c.cost} Credits</span></div><ul class="guarantee-list">${c.guarantee.map(x=>`<li>${x}</li>`).join('')}</ul><div class="divider"></div><p class="muted-note">All allocated questions are saved automatically to My Question Vault after successful allocation.</p></div><div class="ledger"><div class="ledger-row"><span>Current balance</span><strong>${state.credits} Credits</strong></div><div class="ledger-row"><span>${c.name}</span><strong>−${c.cost} Credits</strong></div><div class="ledger-row"><span>Balance after opening</span><strong>${Math.max(0,state.credits-c.cost)} Credits</strong></div></div><div class="button-row"><button class="primary-button" data-action="open-capsule" ${state.credits<c.cost?'disabled':''}>Confirm and Open</button><button class="secondary-button" data-action="back-capsules">Back to Capsules</button></div>${state.credits<c.cost?'<p class="muted-note">Not enough Credits. No charge has been made.</p>':''}</section>`;}

  function openingView(){const c=capsules[state.activeCapsule?.type]||capsules.balanced;return `<section class="screen open-stage"><div><div class="capsule-visual is-opening" aria-hidden="true"><div class="capsule-half left"></div><div class="capsule-half right"></div></div><p class="eyebrow">Practice set ready</p><h1>${c.name}</h1><p>${c.summary}<br>Saved automatically to My Question Vault.</p><div class="button-row"><button class="primary-button" data-action="start-question">Start Question 1</button><button class="text-button" data-action="start-question">Skip animation</button></div></div></section>`;}

  function responseControl(q,slot){const existing=slot.draftAnswer??'';if(q.type==='numeric')return `<div class="answer-field"><label for="answerInput">Your answer</label><div class="answer-input-wrap"><input id="answerInput" inputmode="decimal" autocomplete="off" value="${escapeHtml(existing)}"><span>${q.unit}</span></div><p class="muted-note">Enter a numerical value.</p></div>`;return `<div class="answer-field"><span class="eyebrow">Choose one answer</span><div class="option-list">${q.options.map(o=>`<button type="button" class="option-button ${existing===o?'is-selected':''}" data-answer-option="${escapeHtml(o)}">${escapeHtml(o)}</button>`).join('')}</div></div>`;}

  function questionView(){const cap=state.activeCapsule,slot=currentSlot();if(!cap||!slot)return homeView();const q=questions[slot.currentId],done=cap.slots.filter(s=>s.completed).length,total=cap.slots.length;return `<section class="screen"><div class="section-heading"><div><p class="eyebrow">Question ${cap.currentIndex+1} of ${total}</p><h2>${q.title}</h2></div><button class="inline-button" data-action="save-exit">Save & Exit</button></div><div class="progress-bar"><span style="width:${Math.round(done/total*100)}%"></span></div><article class="question-card"><div class="question-labels"><span class="meta-tag">${q.topic}</span><span class="meta-tag">${q.classification}</span><span class="meta-tag">${q.marks} mark${q.marks>1?'s':''}</span>${slot.currentId!==slot.baseId?'<span class="meta-tag">Alternative</span>':''}</div><p class="question-text">${q.stem}</p>${responseControl(q,slot)}<div class="button-row"><button class="primary-button" data-action="submit-answer">Submit Answer</button>${!cap.rerollUsed&&!slot.completed?'<button class="secondary-button" data-action="reroll">Free Reroll · 1 available</button>':''}<button class="secondary-button" data-action="skip-question">Skip for Now</button></div></article><button class="text-button" data-action="open-progress">View Capsule Progress</button></section>`;}

  function feedbackView(){const cap=state.activeCapsule,slot=currentSlot();if(!cap||!slot)return homeView();const q=questions[slot.currentId],f=slot.lastFeedback||{};return `<section class="screen"><p class="eyebrow">Immediate Feedback</p><div class="feedback-banner ${f.correct?'is-correct':'is-review'}"><strong>${f.correct?'Correct':'Not quite'}</strong><span>${f.correct?'Your answer matches the expected result.':`Correct answer: ${q.answerText}`}</span></div><div class="card"><h2>${q.title}</h2><p><strong>Your answer:</strong> ${escapeHtml(f.answer||'—')}</p><p><strong>Correct answer:</strong> ${q.answerText}</p><p>${q.hint}</p><button class="text-button" data-action="toggle-solution">${f.solutionOpen?'Hide Worked Solution':'View Worked Solution'}</button>${f.solutionOpen?`<div class="divider"></div><div class="solution-steps">${q.solution.map(s=>`<div class="solution-step"><p>${s}</p></div>`).join('')}</div>`:''}</div><div class="button-row"><button class="primary-button" data-action="next-question">${cap.slots.every(s=>s.completed)?'Review Capsule':'Next Question'}</button><button class="secondary-button" data-action="retry-question">Try Again</button><button class="secondary-button" data-action="save-exit">Save & Exit</button></div></section>`;}

  function rerollView(){const slot=currentSlot(),q=slot?questions[slot.currentId]:null,alt=q?questions[q.alternativeId]:null;return `<section class="screen"><p class="eyebrow">Free Reroll</p><h1>Keep this question and get one alternative.</h1><p>The original remains in My Question Vault. Completing either question satisfies this capsule slot.</p><div class="card"><h3>Alternative preview</h3><p>${alt?`${alt.topic} · ${alt.classification}`:'Same-topic alternative'}</p><ul class="guarantee-list"><li>Original question stays available</li><li>Alternative is added permanently</li><li>No extra Credits are charged</li></ul></div><div class="button-row"><button class="primary-button" data-action="accept-reroll">Get Alternative</button><button class="secondary-button" data-action="cancel-reroll">Keep Current Question</button></div></section>`;}

  function progressView(){const cap=state.activeCapsule;if(!cap)return homeView();const allDone=cap.slots.every(s=>s.completed);return `<section class="screen"><p class="eyebrow">Capsule Progress</p><h1>${capsuleName(cap.type)}</h1><p>Every required slot needs a submitted answer. Skipped questions do not count as complete.</p><div class="progress-list">${cap.slots.map((s,i)=>{const q=questions[s.currentId];const label=s.completed?'Completed':s.skipped?'Skipped':'Not Started';const cls=s.completed?(s.lastFeedback?.correct?'':'needs-review'):s.skipped?'skipped':'not-started';return `<div class="card progress-item"><div><h3>${i+1}. ${q.title}</h3><p>${q.topic} · ${q.classification}</p><span class="status ${cls}">${label}</span></div><button class="inline-button" data-open-slot="${i}">${s.completed?'Review':'Open'}</button></div>`;}).join('')}</div><div class="button-row"><button class="primary-button" data-action="continue-incomplete" ${allDone?'disabled':''}>Continue First Incomplete</button>${allDone?'<button class="primary-button" data-action="complete-capsule">Complete Capsule</button>':''}<button class="secondary-button" data-action="save-exit">Save & Exit</button></div></section>`;}

  function completeView(){const cap=state.activeCapsule;if(!cap)return homeView();const correct=cap.slots.filter(s=>s.lastFeedback?.correct).length;return `<section class="screen"><div class="hero"><p class="eyebrow">Capsule complete</p><h1>Your practice set is saved.</h1><p>All required slots have a submitted answer. Questions and Worked Solutions remain in My Question Vault.</p></div><div class="stat-grid"><div class="stat-card"><strong>${cap.slots.length}</strong><span>Questions completed</span></div><div class="stat-card"><strong>${correct}</strong><span>Correct on latest attempt</span></div></div><div class="card"><h3>${state.credits} Credits remaining</h3><p>This capsule will remain in your local prototype history until the data is reset.</p></div><div class="button-row"><button class="primary-button" data-action="open-vault">Open My Question Vault</button><button class="secondary-button" data-action="finish-home">Return Home</button></div></section>`;}

  function filteredVaultEntries(){let entries=Object.values(state.vault);if(state.vaultFilter==='review')entries=entries.filter(e=>e.status==='needs-review');if(state.vaultFilter==='favourite')entries=entries.filter(e=>e.favourite);if(state.vaultFilter==='revision')entries=entries.filter(e=>e.revision);return entries.sort((a,b)=>String(b.unlockedAt).localeCompare(String(a.unlockedAt)));}
  function vaultView(){const entries=filteredVaultEntries();return `<section class="screen"><p class="eyebrow">My Question Vault</p><h1>Your unlocked practice</h1><p>Questions are saved automatically after successful capsule allocation.</p><div class="vault-tabs">${[['all','All'],['review','Needs Review'],['favourite','Favourites'],['revision','Revision Set']].map(([k,l])=>`<button class="chip ${state.vaultFilter===k?'is-selected':''}" data-vault-filter="${k}">${l}</button>`).join('')}</div>${entries.length?entries.map(e=>{const q=questions[e.questionId];return `<article class="card vault-card"><div><h3>${q.title}</h3><p>${q.topic} · ${q.classification}${e.isAlternative?' · Alternative':''}</p><span class="status ${statusClass(e)}">${statusLabel(e)}</span></div><button class="inline-button" data-vault-question="${q.id}">Open</button></article>`;}).join(''):`<div class="card"><h3>No matching questions</h3><p>Open a capsule or change the filter.</p></div>`}</section>`;}

  function vaultDetailView(){const id=state.selectedVaultQuestion,e=state.vault[id],q=questions[id];if(!e||!q)return vaultView();const latest=e.attempts[e.attempts.length-1];return `<section class="screen"><p class="eyebrow">Vault Question</p><h1>${q.title}</h1><div class="question-labels"><span class="meta-tag">${q.topic}</span><span class="meta-tag">${q.classification}</span>${e.isAlternative?'<span class="meta-tag">Alternative</span>':''}</div><div class="card"><p class="question-text">${q.stem}</p>${latest?`<p><strong>Latest answer:</strong> ${escapeHtml(latest.answer)}</p><span class="status ${statusClass(e)}">${statusLabel(e)}</span>`:'<p class="muted-note">No attempt yet. Worked Solution becomes available after submission.</p>'}</div><div class="button-row split"><button class="secondary-button" data-action="toggle-favourite">${e.favourite?'Remove Favourite':'Add Favourite'}</button><button class="secondary-button" data-action="toggle-revision">${e.revision?'Remove from Revision':'Add to Revision'}</button></div>${latest?`<div class="card"><h3>Worked Solution</h3><div class="solution-steps">${q.solution.map(s=>`<div class="solution-step"><p>${s}</p></div>`).join('')}</div></div>`:''}<div class="button-row"><button class="primary-button" data-action="back-vault">Back to Vault</button></div></section>`;}

  function creditsView(){return `<section class="screen"><p class="eyebrow">Credits</p><h1>${state.credits} Credits available</h1><p>Credits unlock complete practice sets. Costs are always shown before confirmation.</p><div class="card"><div class="ledger-row"><span>Quick Capsule</span><strong>3</strong></div><div class="ledger-row"><span>Balanced Capsule</span><strong>6</strong></div><div class="ledger-row"><span>Challenge Capsule</span><strong>8</strong></div></div><div class="card"><h3>Prototype-only options</h3><p>No real advertisement or purchase is active.</p><div class="button-row"><button class="secondary-button" data-action="simulate-ad">Watch an Ad — Earn 2 Credits</button><button class="secondary-button" data-action="simulate-buy">View Credit Options</button></div></div><div class="card"><h3>Prototype tools</h3><p>Participant Code: <strong>${state.participantCode}</strong></p><button class="danger-button" data-action="reset-data">Reset Local Prototype Data</button></div></section>`;}

  function render(){updateChrome();const views={home:homeView,capsules:capsulesView,detail:detailView,opening:openingView,question:questionView,feedback:feedbackView,reroll:rerollView,progress:progressView,complete:completeView,vault:vaultView,'vault-detail':vaultDetailView,credits:creditsView};app.innerHTML=(views[state.route]||homeView)();bindDynamicEvents();}
  function bindDynamicEvents(){document.querySelectorAll('[data-topic]').forEach(b=>b.addEventListener('click',()=>{state.topic=b.dataset.topic;persist();render()}));document.querySelectorAll('[data-capsule]').forEach(b=>b.addEventListener('click',()=>{state.selectedCapsule=b.dataset.capsule;persist();render()}));document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>handleAction(b.dataset.action)));document.querySelectorAll('[data-answer-option]').forEach(b=>b.addEventListener('click',()=>{const s=currentSlot();if(s){s.draftAnswer=b.dataset.answerOption;persist();render();}}));document.querySelectorAll('[data-open-slot]').forEach(b=>b.addEventListener('click',()=>{state.activeCapsule.currentIndex=Number(b.dataset.openSlot);navigate(state.activeCapsule.slots[state.activeCapsule.currentIndex].completed?'feedback':'question')}));document.querySelectorAll('[data-vault-filter]').forEach(b=>b.addEventListener('click',()=>{state.vaultFilter=b.dataset.vaultFilter;persist();render()}));document.querySelectorAll('[data-vault-question]').forEach(b=>b.addEventListener('click',()=>{state.selectedVaultQuestion=b.dataset.vaultQuestion;navigate('vault-detail')}));const input=document.getElementById('answerInput');if(input)input.addEventListener('input',e=>{const s=currentSlot();if(s){s.draftAnswer=e.target.value;persist();}});}
  function validate(q,answer){if(q.type==='numeric'){const n=Number(String(answer).trim());return Number.isFinite(n)&&Math.abs(n-q.answer)<=q.tolerance;}return answer===q.answer;}
  function submitAnswer(){const slot=currentSlot();if(!slot)return;const q=questions[slot.currentId];let answer=slot.draftAnswer??'';if(String(answer).trim()===''){showToast('Enter or choose an answer first.');return;}const correct=validate(q,answer);slot.completed=true;slot.skipped=false;slot.lastFeedback={answer:String(answer),correct,solutionOpen:false,submittedAt:new Date().toISOString()};const e=state.vault[q.id];e.attempts.push({answer:String(answer),correct,submittedAt:new Date().toISOString()});e.status=correct?'completed':'needs-review';persist();navigate('feedback');}
  function moveNext(){const cap=state.activeCapsule;if(!cap)return;const next=findNextIncomplete(cap.currentIndex+1);if(next===-1){navigate(cap.slots.every(s=>s.completed)?'complete':'progress');return;}cap.currentIndex=next;persist();navigate('question');}
  function handleAction(action){switch(action){
    case'choose-capsule':navigate('capsules');break;case'return-home':navigate('home');break;case'view-details':if(state.selectedCapsule)navigate('detail');break;case'back-capsules':navigate('capsules');break;
    case'open-capsule':{if(state.activeCapsule?.status==='active'){showToast('Complete the active capsule first.');return;}const c=capsules[state.selectedCapsule]||capsules.balanced;if(state.credits<c.cost){showToast('Not enough Credits. No charge made.');return;}state.credits-=c.cost;state.activeCapsule=makeCapsule(c.key);persist();navigate('opening');break;}
    case'start-question':navigate('question');break;case'submit-answer':submitAnswer();break;case'toggle-solution':{const s=currentSlot();if(s?.lastFeedback){s.lastFeedback.solutionOpen=!s.lastFeedback.solutionOpen;const e=state.vault[s.currentId];if(e&&s.lastFeedback.solutionOpen)e.solutionSeen=true;persist();render();}break;}
    case'next-question':moveNext();break;case'retry-question':{const s=currentSlot();if(s){s.draftAnswer='';persist();navigate('question');}break;}
    case'reroll':navigate('reroll');break;case'accept-reroll':{const cap=state.activeCapsule,s=currentSlot(),q=s?questions[s.currentId]:null,alt=q?questions[q.alternativeId]:null;if(!cap||!s||!alt||cap.rerollUsed){showToast('No reroll available.');return;}s.alternatives.push(alt.id);s.currentId=alt.id;s.draftAnswer='';s.skipped=false;cap.rerollUsed=true;unlockQuestion(alt.id,cap.id,true);persist();showToast('Alternative added. Original remains in Vault.');navigate('question');break;}
    case'cancel-reroll':navigate('question');break;case'skip-question':{const cap=state.activeCapsule,s=currentSlot();if(!cap||!s)return;s.skipped=true;s.draftAnswer='';persist();const next=findNextIncomplete(cap.currentIndex+1);if(next===-1)navigate('progress');else{cap.currentIndex=next;persist();navigate('question');}break;}
    case'open-progress':navigate('progress');break;case'continue-incomplete':{const n=findNextIncomplete(0);if(n>=0){state.activeCapsule.currentIndex=n;persist();navigate('question');}break;}
    case'continue-capsule':{const n=findNextIncomplete(state.activeCapsule?.currentIndex||0);if(n>=0)state.activeCapsule.currentIndex=n;persist();navigate(n>=0?'question':'progress');break;}
    case'save-exit':persist();showToast('Progress saved on this device.');navigate('home');break;case'complete-capsule':{if(!state.activeCapsule?.slots.every(s=>s.completed)){showToast('Complete every required slot first.');navigate('progress');return;}state.activeCapsule.status='completed';state.activeCapsule.completedAt=new Date().toISOString();persist();navigate('complete');break;}
    case'open-vault':navigate('vault');break;case'finish-home':state.activeCapsule=null;state.selectedCapsule=null;persist();navigate('home');break;case'back-vault':navigate('vault');break;
    case'toggle-favourite':{const e=state.vault[state.selectedVaultQuestion];if(e){e.favourite=!e.favourite;persist();render();}break;}case'toggle-revision':{const e=state.vault[state.selectedVaultQuestion];if(e){e.revision=!e.revision;persist();render();}break;}
    case'simulate-ad':showToast('Prototype only: no ad shown and no Credits added.');break;case'simulate-buy':showToast('Prototype only: no payment requested or made.');break;case'reset-data':if(confirm('Reset all local prototype progress and Credits?'))resetState();break;default:break;}}

  backButton.addEventListener('click',goBack);creditButton.addEventListener('click',()=>navigate('credits'));brandHome.addEventListener('click',()=>navigate('home'));document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.nav)));
  window.addEventListener('storage',e=>{if(!e.key||e.key===STORAGE_KEY){state=loadState();render();}});
  render();
})();

</script>
</body>
</html>
